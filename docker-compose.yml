services:
    client:
        image: client
        build:
            context: .
            dockerfile: ./Dockerfile
        environment:
            NODE_ENV: production
        # .env.local is mounted as a file so the server's dotenv loader reads it
        # the same way it does for local non-Docker dev. Using compose's `env_file:`
        # is intentionally avoided — it interpolates `$` which corrupts bcrypt hashes
        # (e.g. `$2a$10$...`). In production on Azure, env vars come from App Service
        # Application Settings; this mount is local-only.
        volumes:
            - ./.env.local:/usr/src/app/.env.local:ro
            - ./data:/usr/src/app/data
        ports:
            - 3000:3000
